<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PoseNet 互動藝術</title>

  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <!-- ML5.js（固定 0.5.0，新版 API 有差異） -->
  <script src="https://unpkg.com/ml5@0.5.0/dist/ml5.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
    }

    h1 {
      font-size: 1rem;
      font-weight: normal;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 1rem;
    }

    /* p5 會把 canvas 直接插入 body，這裡讓它有圓角 */
    canvas {
      display: block;
      border-radius: 8px;
      border: 1px solid #222;
    }

    #status {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: #555;
    }

    #status.ready { color: #00ff88; }
  </style>
</head>
<body>
  <h1>PoseNet &times; ML5.js</h1>

  <!-- sketch.js 會自動建立 canvas，不需要額外的容器 -->
  <p id="status">載入模型中...</p>

  <!-- 主程式 -->
  <script src="sketch.js"></script>

  <!-- 狀態提示：等 modelLoaded 呼叫後更新文字 -->
  <script>
    // 覆寫 sketch.js 裡的 modelLoaded，加入 UI 更新
    const _originalModelLoaded = window.modelLoaded;
    window.modelLoaded = function () {
      if (typeof _originalModelLoaded === 'function') _originalModelLoaded();
      const el = document.getElementById('status');
      el.textContent = '模型就緒 — 請站到鏡頭前';
      el.classList.add('ready');
    };
  </script>
</body>
</html>
